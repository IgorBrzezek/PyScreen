# ============================================================
# KODY KOLORÓW ANSI 256 (indeksy 0-255)
# ============================================================
# --- Podstawowe 16 kolorów ---
#   0: black         1: red            2: green         3: brown/yellow
#   4: blue          5: magenta        6: cyan          7: white/light gray
#   8: bright black  9: bright red    10: bright green 11: bright yellow
#  12: bright blue  13: bright magenta14: bright cyan  15: bright white
#
# --- Systemowa paleta 216 kolorów (16-231) ---
#  16- 21: odcienie niebieskiego
#  22- 27: odcienie zielonego
#  28- 33: odcienie zielono-niebieskiego
#  34- 39: odcienie zieleni
#  40- 45: odcienie zielono-cyjanowego
#  46- 51: odcienie cyjanowego
#  52- 57: odcienie granatowego
#  58- 63: odcienie zielono-granatowego
#  64- 69: odcienie zieleni
#  70- 75: odcienie zieleni
#  76- 81: odcienie zielono-cyjanowego
#  82- 87: odcienie cyjanowego
#  88- 93: odcienie fioletowego
#  94- 99: odcienie zolto-brazowego
# 100-105: odcienie zolto-zielonego
# 106-111: odcienie zieleni
# 112-117: odcienie zielono-cyjanowego
# 118-123: odcienie cyjanowego
# 124-129: odcienie czerwonego
# 130-135: odcienie pomaranczowego
# 136-141: odcienie zoltego
# 142-147: odcienie zolto-zielonego
# 148-153: odcienie zieleni
# 154-159: odcienie zielono-cyjanowego
# 160-165: odcienie czerwonego
# 166-171: odcienie pomaranczowego
# 172-177: odcienie zoltego
# 178-183: odcienie zolto-zielonego
# 184-189: odcienie zieleni
# 190-195: odcienie cyjanowego
# 196-201: odcienie czerwonego/rozowego
# 202-207: odcienie pomaranczowego/rozowego
# 208-213: odcienie zoltego/rozowego
# 214-219: odcienie zoltego/rozowego
# 220-225: odcienie zoltego/bialego
# 226-231: odcienie zoltego/bialego
#
# --- Skala szarosci (232-255) ---
# 232: najciemniejszy szary  233-237: ciemne szare
# 238-242: srednie szare     243-247: jasne szare
# 248-252: jasne szare       253-255: biale
#
# --- Przydatne kolory ---
# 16: #000000 (czarny)         17: #00005f
# 18: #000087                  19: #0000af
# 20: #0000d7                  21: #0000ff (czysty niebieski)
# 22: #005f00                  28: #008700
# 34: #00af00                  40: #00d700
# 46: #00ff00 (czysty zielony) 51: #00ffff (czysty cyjan)
# 52: #5f0000                  88: #870000
# 124: #af0000                 160: #df0000
# 196: #ff0000 (czysty czerwony)
# 82: #5fff00                  118: #87ff00
# 154: #afff00                 190: #dfff00
# 226: #ffff00 (czysty zolty)
# 93: #8700ff                  129: #af00ff
# 165: #df00ff                 201: #ff00ff (czysty magenta)
# 232-255: skala szarosci (#080808 - #eeeeee)
# ============================================================

[statusbar]
# Pozycja paska: "top" lub "bottom"
position = bottom

# Kolor tla paska statusu (ANSI 256-color index: 0-255)
# Domyslnie: 4 (blue)
background_color = 4

# Kolor tekstu paska statusu
# Domyslnie: 15 (bright white)
foreground_color = 15

# Kolor nazwy aktywnego okna
# Domyslnie: fg=14 (bright cyan), bg=4 (blue)
active_window_fg = 14
active_window_bg = 4

# Kolor nazw nieaktywnych okien
# Domyslnie: fg=7 (white), bg=4 (blue)
inactive_window_fg = 7
inactive_window_bg = 4

# Symbol otaczajacy nazwy okien: "parens" -> (nazwa) lub "brackets" -> [nazwa]
# Dostepne: parens, brackets, angles, braces
window_brackets = parens

# Symbol aktywnego okna
active_symbol = *

# Kolor nawiasow otaczajacych aktywna nazwe okna
# Domyslnie: fg=14 (bright cyan), bg=4 (blue) — tak samo jak aktywna nazwa
active_bracket_fg = 9
active_bracket_bg = 4

# Kolor nawiasow otaczajacych nieaktywna nazwe okna
# Domyslnie: fg=7 (white), bg=4 (blue) — tak samo jak nieaktywna nazwa
inactive_bracket_fg = 7
inactive_bracket_bg = 4

# Czy wyswietlac zegar
show_clock = yes

# Format zegara. Tokeny: HH, MM, SS, DD, MO, YY, YYYY
# Separator: dowolny znak (|, :, -, /)
clock_format = HH:MM

# Pozycja zegara: "left" lub "right"
clock_position = right

# Czy wyswietlac nazwe hosta na pasku statusu: ON / OFF
hostname = ON

# Kolor czcionki nazwy hosta (ANSI 256-color index: 0-255)
# Domyslnie: 15 (bright white)
hostname_fg = 15

# Kolor czcionki zegara (ANSI 256-color index: 0-255)
# Domyslnie: 15 (bright white)
clock_fg = 15

# Kolor znakow separatora '|' na pasku statusu (ANSI 256-color index: 0-255)
# Domyslnie: 15 (bright white)
separator_fg = 3

[shell]
# Domyslna powloka
command = cmd.exe

# Domyslna nazwa nowego okna
default_name = shell

[keybindings]
# Klawisz prefix (domyslnie Ctrl+A)
prefix = Ctrl+A

[keybinds]
# Konfiguracja skrotow Ctrl+A + <klawisz> -> akcja
# Format: klawisz = nazwa_akcji
# Mozliwe akcje:
#   new_window, next_window, prev_window, last_window,
#   rename, kill_window, list_windows, select_window,
#   detach, help, redraw, scroll_up, scroll_down
#
# Domyslne ustawienia (odkomentuj i zmien aby nadpisac):
#c = new_window
#n = next_window
#p = prev_window
#A = rename
#a = rename
#k = kill_window
#w = list_windows
#" = select_window
#d = detach
#? = help
#l = redraw

[display]
# Kolor tla glownego obszaru terminala
# Wartosc "default" oznacza brak nadpisywania
main_background = default
